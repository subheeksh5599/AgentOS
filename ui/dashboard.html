<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — AgentOS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root { --bg: #0F0D0A; --accent: #E63A1B; --text: #EFEAE3; --muted: #6A6358; --line: rgba(232,226,209,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', -apple-system, sans-serif; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }

        nav { padding: 20px 4vw; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
        .nav-l { font-weight: 900; font-size: 20px; }
        .nav-l span { color: var(--accent); }
        .nav-r { display: flex; gap: 24px; align-items: center; font-size: 13px; }
        .nav-r a { color: var(--muted); }
        .nav-r a:hover { color: var(--text); }

        main { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: var(--line); border-radius: 12px; padding: 18px; text-align: center; }
        .stat-card .val { font-size: 32px; font-weight: 900; color: var(--accent); }
        .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 4px; }

        .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin: 32px 0 16px; }

        .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 32px; }
        .agent-card { background: rgba(232,226,209,0.04); border: 1px solid var(--line); border-radius: 14px; padding: 20px; }
        .agent-card .ac-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .agent-card .ac-name { font-weight: 700; font-size: 16px; }
        .agent-card .ac-type { font-size: 10px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; color: #fff; }
        .ac-type.yield { background: #10B981; }
        .ac-type.trader { background: #E63A1B; }
        .ac-type.prediction { background: #3B82F6; }
        .agent-card .ac-meta { font-size: 12px; color: var(--muted); line-height: 1.7; }
        .agent-card .ac-meta span { color: var(--text); }
        .agent-card .ac-actions { margin-top: 14px; display: flex; gap: 8px; }
        .agent-card .ac-actions button {
            padding: 6px 14px; border-radius: 8px; border: 1px solid var(--line); background: transparent;
            color: var(--text); font-size: 11px; cursor: pointer; font-family: inherit;
            transition: all 0.2s;
        }
        .agent-card .ac-actions button:hover { border-color: var(--accent); color: var(--accent); }
        .agent-card .ac-actions button.stop-btn:hover { border-color: #ef4444; color: #ef4444; }

        .event-list { display: flex; flex-direction: column; gap: 8px; max-height: 500px; overflow-y: auto; }
        .event-row { display: grid; grid-template-columns: 120px 80px 1fr 100px; gap: 12px; align-items: center; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--line); font-size: 13px; }
        @media(max-width:700px) { .event-row { grid-template-columns: 70px 50px 1fr; } .event-row .ev-time { display: none; } }
        .ev-agent { font-weight: 600; color: var(--accent); }
        .ev-type { font-size: 10px; padding: 2px 6px; border-radius: 3px; text-align: center; }
        .ev-summary { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ev-time { color: var(--muted); font-size: 11px; text-align: right; }

        .empty-msg { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }

        .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .refresh-bar .dot-live { width: 6px; height: 6px; border-radius: 50%; background: #10B981; animation: blink 1.5s infinite; display: inline-block; margin-right: 6px; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .refresh-bar span { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-l">Agent<span>OS</span> Dashboard</a>
        <div class="nav-r">
            <a href="index.html">Home</a>
            <a href="deploy.html">Deploy</a>
            <a href="dashboard.html" style="color:var(--accent)">Dashboard</a>
        </div>
    </nav>

    <main>
        <div class="stats-row">
            <div class="stat-card"><div class="val" id="statRunning">3</div><div class="label">Agents Running</div></div>
            <div class="stat-card"><div class="val" id="statTotal">3</div><div class="label">Total Deployed</div></div>
            <div class="stat-card"><div class="val" id="statEvents">0</div><div class="label">Events Today</div></div>
            <div class="stat-card"><div class="val" class="val" style="color:#10B981" id="statNetwork">Sui</div><div class="label">Network</div></div>
        </div>

        <div class="refresh-bar"><span><span class="dot-live"></span>Live — auto-refreshing</span><span>SSE Stream Active</span></div>

        <div class="section-title">Running Agents</div>
        <div class="agent-grid" id="agentGrid"><div class="empty-msg">Loading agents...</div></div>

        <div class="section-title">Live Events</div>
        <div class="event-list" id="eventList"><div class="empty-msg">Connecting to SSE stream...</div></div>
    </main>

    <script>
        var API = window.location.origin;
        var eventCount = 0;

        function updateStats(running, total) {
            document.getElementById("statRunning").textContent = running;
            document.getElementById("statTotal").textContent = total;
            document.getElementById("statEvents").textContent = eventCount;
        }

        function renderAgents(agents) {
            var grid = document.getElementById("agentGrid");
            if (!agents || !agents.length) { grid.innerHTML = '<div class="empty-msg">No agents deployed. <a href="deploy.html">Deploy one &rarr;</a></div>'; return; }
            var running = 0;
            var h = "";
            agents.forEach(function(a) {
                if (a.running) running++;
                var color = a.type === "yield" ? "#10B981" : a.type === "trader" ? "#E63A1B" : "#3B82F6";
                h += '<div class="agent-card">';
                h += '<div class="ac-header"><span class="ac-name">' + a.name + '</span><span class="ac-type ' + a.type + '">' + a.type + '</span></div>';
                h += '<div class="ac-meta">ID: <span>' + a.id + '</span><br>Interval: <span>' + a.interval_seconds + 's</span><br>';
                h += 'Status: <span style="color:' + (a.running ? '#10B981' : '#ef4444') + '">' + (a.running ? 'Running' : 'Stopped') + '</span>';
                if (a.wallet_address && a.wallet_address.length > 0) h += '<br>Wallet: <span>' + a.wallet_address.substring(0,10) + '...</span>';
                h += '</div>';
                h += '<div class="ac-actions">';
                if (a.running) {
                    h += '<button class="stop-btn" onclick="stopAgent(\'' + a.id + '\')">Stop</button>';
                } else {
                    h += '<button onclick="startAgent(\'' + a.id + '\')">Start</button>';
                }
                h += '</div></div>';
            });
            grid.innerHTML = h;
            updateStats(running, agents.length);
        }

        function addEvent(ev) {
            if (!ev || !ev.agent_type || ev.event_type === "heartbeat") return;
            eventCount++;
            document.getElementById("statEvents").textContent = eventCount;
            var list = document.getElementById("eventList");
            var colorMap = {"yield":"#10B981","trader":"#E63A1B","prediction":"#3B82F6"};
            var row = document.createElement("div");
            row.className = "event-row";
            var t = new Date(ev.timestamp);
            var ts = t.toLocaleTimeString("en-US", {hour12:false, hour:"2-digit", minute:"2-digit", second:"2-digit"});
            row.innerHTML =
                '<span class="ev-agent">' + (ev.agent_name || ev.agent_type) + '</span>' +
                '<span class="ev-type" style="background:' + (colorMap[ev.agent_type] || "#666") + ';color:#fff">' + (ev.event_type || "") + '</span>' +
                '<span class="ev-summary" title="' + (ev.summary || "") + '">' + (ev.summary || "—") + '</span>' +
                '<span class="ev-time">' + ts + '</span>';
            list.insertBefore(row, list.firstChild);
            if (list.children.length > 50) { for (var i = 50; i < list.children.length; i++) list.removeChild(list.children[i]); }
        }

        function startAgent(id) {
            fetch(API + "/api/runtime/agents/start", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({agent_id: id})})
                .then(function() { fetchAgents(); });
        }

        function stopAgent(id) {
            fetch(API + "/api/runtime/agents/stop", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({agent_id: id})})
                .then(function() { fetchAgents(); });
        }

        function fetchAgents() {
            fetch(API + "/api/runtime/agents")
                .then(function(r) { return r.json(); })
                .then(function(d) { renderAgents(d.agents); })
                .catch(function() {});
        }

        function connectSSE() {
            try {
                var sse = new EventSource(API + "/api/runtime/events");
                sse.onmessage = function(e) {
                    try { var ev = JSON.parse(e.data); addEvent(ev); } catch(_) {}
                };
                sse.onerror = function() { sse.close(); setTimeout(connectSSE, 5000); };
            } catch(_) { setTimeout(connectSSE, 3000); }
        }

        fetchAgents();
        connectSSE();
        setInterval(fetchAgents, 15000);
    </script>
</body>
</html>
